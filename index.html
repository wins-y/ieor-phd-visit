<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhD Visit Day — Faculty Meetings</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f6f3;--surface:#fff;--text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#e0ded8;--accent:#2557a7;--accent-lt:#e8eff8;--accent-dk:#1a3f7a;
  --green:#276749;--green-lt:#e6f4ed;--green-bd:#a3d4b7;
  --amber:#92600a;--amber-lt:#fef3e2;--amber-bd:#f0c36d;
  --red:#c53030;--red-lt:#fde8e8;
  --gray-lt:#f0efec;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Source Sans 3',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;position:sticky;top:0;z-index:100}
.header-inner{max-width:820px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.header h1{font-size:1.1rem;font-weight:600}
.event-date{font-size:.82rem;color:var(--text2)}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:var(--radius);padding:3px}
.tab{padding:.35rem .9rem;border:none;background:0;border-radius:6px;font:inherit;font-size:.82rem;font-weight:500;color:var(--text2);cursor:pointer;transition:.15s}
.tab:hover{color:var(--text)}
.tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.main{max-width:820px;margin:0 auto;padding:1.5rem}
.info{background:var(--accent-lt);border:1px solid #c2d3e8;border-radius:var(--radius-lg);padding:.9rem 1.1rem;margin-bottom:1.25rem;font-size:.85rem;color:var(--accent-dk);line-height:1.6}
.select-wrap{margin-bottom:1.25rem}
.select-wrap label{display:block;font-size:.8rem;font-weight:500;color:var(--text2);margin-bottom:.35rem}
.select-wrap select{width:100%;max-width:400px;padding:.55rem .75rem;border:1px solid var(--border);border-radius:var(--radius);font:inherit;font-size:.92rem;background:var(--surface);color:var(--text);cursor:pointer;appearance:auto}
.select-wrap select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.fac-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem}
.fac-header{margin-bottom:1rem}
.fac-name{font-size:1.05rem;font-weight:600}
.fac-link{font-size:.82rem;margin-top:.2rem}
.fac-link a{color:var(--accent);text-decoration:none}
.fac-link a:hover{text-decoration:underline}
.slots-label{font-size:.78rem;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem}
.slots{display:flex;flex-wrap:wrap;gap:.45rem}
.slot{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;min-width:90px;padding:.45rem .65rem;border-radius:var(--radius);font-size:.8rem;font-weight:500;border:1px solid transparent;cursor:default;transition:.15s;text-align:center;gap:.15rem}
.slot-open{background:var(--green-lt);color:var(--green);border-color:var(--green-bd);cursor:pointer}
.slot-open:hover{background:#d0eddb;transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.06)}
.slot-booked{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}
.slot-unavail{background:var(--gray-lt);color:var(--text3);font-weight:400}
.slot-yours{background:var(--accent-lt);color:var(--accent);border-color:#a0bfe0;font-weight:600}
.legend{display:flex;gap:1.1rem;flex-wrap:wrap;font-size:.78rem;color:var(--text2);margin-bottom:1.25rem}
.legend-i{display:flex;align-items:center;gap:.35rem}
.legend-s{width:13px;height:13px;border-radius:3px;border:1px solid var(--border)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--surface);border-radius:14px;padding:1.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h2{font-size:1rem;font-weight:600;margin-bottom:.2rem}
.modal .sub{font-size:.83rem;color:var(--text2);margin-bottom:1.1rem}
.modal label{display:block;font-size:.78rem;font-weight:500;color:var(--text2);margin-bottom:.25rem}
.modal input{width:100%;padding:.5rem .7rem;border:1px solid var(--border);border-radius:var(--radius);font:inherit;font-size:.9rem;margin-bottom:.85rem;background:var(--surface);color:var(--text)}
.modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.btn-row{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.5rem}
.btn{padding:.45rem 1rem;border:1px solid var(--border);border-radius:var(--radius);font:inherit;font-size:.84rem;font-weight:500;cursor:pointer;transition:.15s;background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:var(--accent-dk)}
.btn-d{color:var(--red);border-color:var(--red)}
.btn-d:hover{background:var(--red-lt)}
.btn:disabled{opacity:.4;cursor:default}
.confirm-box{background:var(--green-lt);border:1px solid var(--green-bd);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;text-align:center}
.confirm-box .code{font-size:1.7rem;font-weight:700;letter-spacing:.12em;color:var(--green);margin:.4rem 0}
.confirm-box p{font-size:.83rem;color:var(--text2)}
.lookup{max-width:480px}
.lookup input{width:100%;padding:.55rem .75rem;border:1px solid var(--border);border-radius:var(--radius);font:inherit;font-size:.9rem;margin-bottom:.6rem;background:var(--surface);color:var(--text)}
.lookup input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.booking-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.booking-card .bc-info{font-size:.88rem}
.booking-card .bc-info strong{font-weight:600}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:.6rem 1.2rem;border-radius:var(--radius);font-size:.85rem;font-weight:500;color:#fff;z-index:2000;animation:slideup .3s;pointer-events:none}
.toast-ok{background:var(--green)}
.toast-err{background:var(--red)}
@keyframes slideup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.loading{text-align:center;padding:4rem 1rem;color:var(--text2);font-size:.95rem}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:.75rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:.88rem}
</style>
</head>
<body>

<script>
// *** PASTE YOUR GOOGLE APPS SCRIPT DEPLOYMENT URL HERE ***
var API_URL = "YOUR_APPS_SCRIPT_URL_HERE";
var API_CONFIGURED = false;
</script>

<div class="header">
  <div class="header-inner">
    <div>
      <h1 id="hdr-title">PhD Visit Day</h1>
      <div class="event-date" id="hdr-date"></div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('book')">Book meetings</button>
      <button class="tab" onclick="switchTab('my')">My bookings</button>
    </div>
  </div>
</div>

<div class="main" id="app">
  <div class="loading"><div class="spin"></div><br>Loading schedule...</div>
</div>

<div id="toast-container"></div>

<script>
var config = null;
var bookedSlots = [];
var currentTab = "book";
var selectedFaculty = "";
var confirmationData = null;

window.addEventListener("DOMContentLoaded", function() {
  if (!API_CONFIGURED) {
    document.getElementById("app").innerHTML =
      '<div class="info" style="max-width:600px;margin:2rem auto;">' +
      '<strong>Setup needed:</strong> Open <code>index.html</code>, find <code>API_URL</code> near the top, and paste your Google Apps Script deployment URL. Then set <code>API_CONFIGURED = true</code>.' +
      '</div>';
    return;
  }
  loadAll();
});

function loadAll() {
  Promise.all([
    apiFetch("GET", "getConfig"),
    apiFetch("GET", "getBookings")
  ]).then(function(results) {
    config = results[0];
    bookedSlots = results[1] || [];
    if (config.error) {
      document.getElementById("app").innerHTML = '<div class="info">' + config.error + '</div>';
      return;
    }
    document.getElementById("hdr-title").textContent = config.eventTitle || "PhD Visit Day";
    document.getElementById("hdr-date").textContent = config.eventDate || "";
    render();
  }).catch(function(err) {
    document.getElementById("app").innerHTML = '<div class="info">Error loading schedule: ' + err.message + '</div>';
  });
}

// ========== API ==========

function apiFetch(method, action, params) {
  var url = API_URL + "?action=" + encodeURIComponent(action);
  if (params) {
    for (var k in params) url += "&" + k + "=" + encodeURIComponent(params[k]);
  }
  return fetch(url, { method: "GET", redirect: "follow" })
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    });
}

function apiPost(action, body) {
  return fetch(API_URL, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({ action: action }, body))
  }).then(function(r) {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  });
}

// ========== TABS ==========

function switchTab(tab) {
  currentTab = tab;
  confirmationData = null;
  document.querySelectorAll(".tab").forEach(function(t){
    t.classList.toggle("on", t.textContent.toLowerCase().indexOf(tab === "book" ? "book meet" : "my book") !== -1);
  });
  render();
}

// ========== RENDER ==========

function render() {
  var app = document.getElementById("app");
  if (currentTab === "book") {
    app.innerHTML = renderBookView();
  } else {
    app.innerHTML = renderMyView();
  }
}

function renderBookView() {
  var h = "";

  if (confirmationData) {
    h += '<div class="confirm-box">' +
         '<p>Booking confirmed!</p>' +
         '<div class="code">' + esc(confirmationData.code) + '</div>' +
         '<p><strong>' + esc(confirmationData.faculty) + '</strong> at ' + esc(confirmationData.time) + '</p>' +
         '<p style="margin-top:.5rem">This is your confirmation code for all bookings. Use it with your email to view or cancel.</p>' +
         '</div>';
  }

  h += '<div class="info">Select a faculty member to see their available time slots. ' +
       'Click an open slot to book a 30-minute 1:1 meeting. You can book meetings with multiple faculty members.</div>';

  h += '<div class="select-wrap">' +
       '<label>Choose a faculty member</label>' +
       '<select id="fac-select" onchange="onSelectFaculty(this.value)">' +
       '<option value="">— Select faculty —</option>';
  config.faculty.forEach(function(f) {
    var sel = f.name === selectedFaculty ? " selected" : "";
    h += '<option value="' + esc(f.name) + '"' + sel + '>' + esc(f.name) + '</option>';
  });
  h += '</select></div>';

  h += '<div class="legend">' +
       '<div class="legend-i"><div class="legend-s" style="background:var(--green-lt);border-color:var(--green-bd)"></div> Open</div>' +
       '<div class="legend-i"><div class="legend-s" style="background:var(--amber-lt);border-color:var(--amber-bd)"></div> Booked</div>' +
       '<div class="legend-i"><div class="legend-s" style="background:var(--gray-lt)"></div> Not available</div>' +
       '<div class="legend-i"><div class="legend-s" style="background:var(--accent-lt);border-color:#a0bfe0"></div> Your booking</div>' +
       '</div>';

  if (selectedFaculty) {
    var fac = config.faculty.find(function(f){ return f.name === selectedFaculty; });
    if (fac) {
      h += '<div class="fac-card">';
      h += '<div class="fac-header"><div class="fac-name">' + esc(fac.name) + '</div>';
      if (fac.website) {
        h += '<div class="fac-link"><a href="' + esc(fac.website) + '" target="_blank">View faculty page &rarr;</a></div>';
      }
      if (fac.email) {
        h += '<div class="fac-link" style="color:var(--text2)"><a href="mailto:' + esc(fac.email) + '">' + esc(fac.email) + '</a></div>';
      }
      if (fac.room) {
        h += '<div class="fac-link" style="color:var(--text2)">Room: ' + esc(fac.room) + '</div>';
      }
      h += '</div>';
      h += '<div class="slots-label">Available slots (' + config.slotDuration + ' min each)</div>';
      h += '<div class="slots">';

      var myBookings = getMyBookingsLocal();

      config.timeSlots.forEach(function(t) {
        var isUnavail = fac.unavailable && fac.unavailable.indexOf(t) !== -1;
        var isBooked = bookedSlots.some(function(b){ return b.faculty === fac.name && b.time === t; });
        var isYours = myBookings.some(function(mb){ return mb.faculty === fac.name && mb.time === t; });

        if (isUnavail) {
          h += '<div class="slot slot-unavail">' + esc(t) + '<span style="font-size:.68rem">unavailable</span></div>';
        } else if (isYours) {
          h += '<div class="slot slot-yours">' + esc(t) + '<span style="font-size:.68rem">yours</span></div>';
        } else if (isBooked) {
          h += '<div class="slot slot-booked">' + esc(t) + '<span style="font-size:.68rem">booked</span></div>';
        } else {
          h += '<div class="slot slot-open" onclick="openBookModal(\'' + esc(fac.name) + "','" + esc(t) + '\')">' + esc(t) + '<span style="font-size:.68rem">open</span></div>';
        }
      });

      h += '</div></div>';
    }
  } else {
    h += '<div class="empty">Select a faculty member above to see their schedule.</div>';
  }

  return h;
}

function renderMyView() {
  var h = '<div class="lookup">';
  h += '<div class="info">Enter your email and confirmation code to view your bookings.</div>';
  h += '<input type="email" id="lookup-email" placeholder="Your email">';
  h += '<input type="text" id="lookup-code" placeholder="Confirmation code" style="text-transform:uppercase">';
  h += '<button class="btn btn-p" onclick="doLookup()" style="margin-bottom:1.25rem">Look up</button>';
  h += '<div id="lookup-results"></div>';
  h += '</div>';
  return h;
}

// ========== ACTIONS ==========

function onSelectFaculty(name) {
  selectedFaculty = name;
  render();
}

function openBookModal(faculty, time) {
  var myLocal = getMyBookingsLocal();
  var conflict = myLocal.find(function(b){ return b.time === time; });
  if (conflict) {
    toast("You already have a meeting at " + time + " with " + conflict.faculty + ". Cancel it first.", "err");
    return;
  }

  var overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.id = "modal-overlay";
  overlay.onclick = function(e){ if(e.target===overlay) closeModal(); };

  var saved = getMyInfo();

  overlay.innerHTML =
    '<div class="modal">' +
    '<h2>Book meeting</h2>' +
    '<div class="sub">' + esc(faculty) + ' &mdash; ' + esc(time) + ' (' + config.slotDuration + ' min)</div>' +
    '<label>Your name</label>' +
    '<input type="text" id="book-name" value="' + esc(saved.name) + '" placeholder="Jane Smith">' +
    '<label>Your email</label>' +
    '<input type="email" id="book-email" value="' + esc(saved.email) + '" placeholder="js1234@university.edu">' +
    '<div class="btn-row">' +
    '<button class="btn" onclick="closeModal()">Cancel</button>' +
    '<button class="btn btn-p" id="book-submit" onclick="submitBooking(\'' + esc(faculty) + "','" + esc(time) + '\')">Book this slot</button>' +
    '</div></div>';

  document.body.appendChild(overlay);
  var nameInput = document.getElementById("book-name");
  if (!nameInput.value) nameInput.focus();
  else document.getElementById("book-email").focus();
}

function closeModal() {
  var el = document.getElementById("modal-overlay");
  if (el) el.remove();
}

function submitBooking(faculty, time) {
  var name = document.getElementById("book-name").value.trim();
  var email = document.getElementById("book-email").value.trim();
  if (!name || !email) { toast("Please enter your name and email.", "err"); return; }

  var btn = document.getElementById("book-submit");
  btn.disabled = true;
  btn.textContent = "Booking...";

  apiPost("book", { faculty: faculty, time: time, name: name, email: email })
    .then(function(res) {
      if (res.error) { toast(res.error, "err"); btn.disabled = false; btn.textContent = "Book this slot"; return; }
      saveMyInfo(name, email);
      saveMyCode(res.code);
      addMyBookingLocal({ faculty: faculty, time: time });
      confirmationData = { code: res.code, faculty: faculty, time: time };
      closeModal();
      apiFetch("GET", "getBookings").then(function(b){
        bookedSlots = b || [];
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    })
    .catch(function(err) { toast("Network error: " + err.message, "err"); btn.disabled = false; btn.textContent = "Book this slot"; });
}

function doLookup() {
  var email = (document.getElementById("lookup-email").value || "").trim();
  var code = (document.getElementById("lookup-code").value || "").trim();
  if (!email || !code) { toast("Please enter both email and code.", "err"); return; }

  apiFetch("GET", "lookup", { email: email, code: code }).then(function(res) {
    var el = document.getElementById("lookup-results");
    if (res.error) {
      el.innerHTML = '<div class="empty">' + esc(res.error) + '</div>';
      return;
    }
    var bookings = res.bookings || [];
    if (bookings.length === 0) {
      el.innerHTML = '<div class="empty">No active bookings found.</div>';
      return;
    }
    // Save locally
    saveMyInfo(bookings[0].name, email);
    saveMyCode(code);
    localStorage.setItem("phd-visit-bookings", JSON.stringify(
      bookings.map(function(b){ return { faculty: b.faculty, time: b.time }; })
    ));

    var h = '<p style="font-size:.85rem;color:var(--text2);margin-bottom:.75rem">You have ' + bookings.length + ' booking(s):</p>';
    bookings.forEach(function(b) {
      h += '<div class="booking-card">' +
           '<div class="bc-info"><strong>' + esc(b.faculty) + '</strong> &mdash; ' + esc(b.time) + '</div>' +
           '<button class="btn btn-d" onclick="doCancelBooking(\'' + esc(b.faculty) + "','" + esc(b.time) + '\',this)">Cancel</button>' +
           '</div>';
    });
    el.innerHTML = h;
  }).catch(function(err) {
    document.getElementById("lookup-results").innerHTML = '<div class="empty">Error: ' + err.message + '</div>';
  });
}

function doCancelBooking(faculty, time, btn) {
  if (!confirm("Cancel your meeting with " + faculty + " at " + time + "?")) return;
  btn.disabled = true;
  btn.textContent = "Cancelling...";

  var saved = getMyInfo();
  var code = getMyCode();

  apiPost("cancel", { email: saved.email, code: code, faculty: faculty, time: time }).then(function(res) {
    if (res.error) { toast(res.error, "err"); btn.disabled = false; btn.textContent = "Cancel"; return; }
    toast("Booking cancelled.");
    removeMyBookingLocal(faculty, time);
    apiFetch("GET", "getBookings").then(function(b){ bookedSlots = b || []; });
    doLookup();
  }).catch(function(err) { toast(err.message, "err"); btn.disabled = false; btn.textContent = "Cancel"; });
}

// ========== LOCAL MEMORY ==========

function getMyInfo() {
  try { return JSON.parse(localStorage.getItem("phd-visit-info") || "{}"); }
  catch(e) { return {}; }
}
function saveMyInfo(name, email) {
  localStorage.setItem("phd-visit-info", JSON.stringify({ name: name, email: email }));
}
function getMyCode() {
  try { return localStorage.getItem("phd-visit-code") || ""; }
  catch(e) { return ""; }
}
function saveMyCode(code) {
  localStorage.setItem("phd-visit-code", code);
}
function getMyBookingsLocal() {
  try { return JSON.parse(localStorage.getItem("phd-visit-bookings") || "[]"); }
  catch(e) { return []; }
}
function addMyBookingLocal(b) {
  var arr = getMyBookingsLocal();
  arr.push(b);
  localStorage.setItem("phd-visit-bookings", JSON.stringify(arr));
}
function removeMyBookingLocal(faculty, time) {
  var arr = getMyBookingsLocal().filter(function(b){ return !(b.faculty === faculty && b.time === time); });
  localStorage.setItem("phd-visit-bookings", JSON.stringify(arr));
}

// ========== HELPERS ==========

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function toast(msg, type) {
  var el = document.createElement("div");
  el.className = "toast " + (type === "err" ? "toast-err" : "toast-ok");
  el.textContent = msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(function(){ el.remove(); }, 3500);
}
</script>
</body>
</html>
